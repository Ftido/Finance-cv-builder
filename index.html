const generateFinanceSummary = (targetRole) => {
  return `Detail-oriented finance professional targeting ${targetRole} opportunities, with practical experience in reconciliations, reporting support, record accuracy, and month-end administration. Skilled in accounts payable and receivable workflows, invoicing, data capturing, and spreadsheet-based reporting. Committed to compliance, clear documentation, and reliable financial operations support.`;
};

const calculateKeywordCoverage = (cvData) => {
  const fullText = [
    cvData.personal.summary,
    cvData.personal.targetRole,
    ...cvData.experience.flatMap((exp) => [exp.role, exp.company, ...exp.bullets]),
    ...cvData.skills.accounting,
    ...cvData.skills.systems,
    ...cvData.skills.compliance
  ].join(' ').toLowerCase();

  const matched = financeKeywords.filter((kw) => fullText.includes(kw.toLowerCase()));
  const score = Math.min(100, Math.round((matched.length / financeKeywords.length) * 100));

  return { score, matched };
};

const SkillCategory = ({ title, skills, onAddSkill, onRemoveSkill }) => {
  const [input, setInput] = useState('');

  const add = () => {
    const trimmed = input.trim();
    if (!trimmed) return;
    onAddSkill(trimmed);
    setInput('');
  };

  return (
    <div className="mb-5">
      <h4 className="font-semibold text-ink-900 mb-2">{title}</h4>
      <div className="flex flex-wrap gap-2 mb-3">
        {skills.map((s, i) => (
          <span key={`${s}-${i}`} className="inline-flex items-center gap-2 px-2.5 py-1 rounded-full bg-brand-100 text-ink-900 text-sm">
            {s}
            <button type="button" onClick={() => onRemoveSkill(s)} className="text-ink-500 hover:text-ink-900">×</button>
          </span>
        ))}
      </div>
      <div className="flex gap-2">
        <input
          value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => e.key === 'Enter' && add()}
          placeholder={`Add ${title.toLowerCase()}...`}
          className="input-field"
        />
        <button type="button" className="btn-secondary px-4 rounded-lg font-semibold" onClick={add}>Add</button>
      </div>
    </div>
  );
};

const Builder = ({ cvData, setCvData, onBack }) => {
  const [step, setStep] = useState(0);

  const stepNames = ['Personal', 'Experience', 'Skills', 'Education', 'Review'];
  const roleSuggestions = roleBulletSuggestions[cvData.personal.targetRole] || roleBulletSuggestions['Junior Accountant'];

  const keywordStatus = useMemo(() => calculateKeywordCoverage(cvData), [cvData]);

  const updatePersonal = (field, value) => {
    setCvData((prev) => ({ ...prev, personal: { ...prev.personal, [field]: value } }));
  };

  const addExperience = () => {
    setCvData((prev) => ({
      ...prev,
      experience: [...prev.experience, { company: '', role: '', startDate: '', endDate: '', bullets: [''] }]
    }));
  };

  const updateExperience = (index, updated) => {
    setCvData((prev) => {
      const list = [...prev.experience];
      list[index] = updated;
      return { ...prev, experience: list };
    });
  };

  const removeExperience = (index) => {
    setCvData((prev) => ({ ...prev, experience: prev.experience.filter((_, i) => i !== index) }));
  };

  const addEducation = () => {
    setCvData((prev) => ({
      ...prev,
      education: [...prev.education, { qualification: '', institution: '', year: '' }]
    }));
  };

  const updateEducation = (index, updated) => {
    setCvData((prev) => {
      const list = [...prev.education];
      list[index] = updated;
      return { ...prev, education: list };
    });
  };

  const removeEducation = (index) => {
    setCvData((prev) => ({ ...prev, education: prev.education.filter((_, i) => i !== index) }));
  };

  const addSkill = (cat, skill) => {
    setCvData((prev) => ({ ...prev, skills: { ...prev.skills, [cat]: [...prev.skills[cat], skill] } }));
  };

  const removeSkill = (cat, skill) => {
    setCvData((prev) => ({ ...prev, skills: { ...prev.skills, [cat]: prev.skills[cat].filter((s) => s !== skill) } }));
  };

  const addFinanceSuggestions = (index) => {
    const exp = cvData.experience[index];
    const merged = [...exp.bullets.filter(Boolean), ...roleSuggestions].slice(0, 6);
    updateExperience(index, { ...exp, bullets: merged });
  };

  const downloadPDF = () => {
    const element = document.getElementById('cv-print-area');
    const opts = {
      margin: [18, 16, 18, 16],
      filename: `${cvData.personal.name || 'Finance-CV'}.pdf`,
      image: { type: 'jpeg', quality: 0.92 },
      html2canvas: { scale: 1.4, useCORS: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait', compress: true }
    };
    html2pdf().set(opts).from(element).save();
  };

  return (
    <div className="max-w-7xl mx-auto px-4 py-6 md:py-8">
      <div className="flex flex-wrap justify-between items-center gap-3 mb-5">
        <div>
          <h1 className="text-2xl md:text-3xl font-bold text-ink-900">Finance CV Builder</h1>
          <p className="text-sm text-ink-600">Build an ATS-friendly CV for finance and accounting roles.</p>
          <p className="text-xs text-ink-500 mt-1">
            Product by{' '}
            <a href={BRAND_SITE} target="_blank" rel="noopener noreferrer" className="text-brand-700 hover:underline">
              {BRAND_NAME}
            </a>
          </p>
        </div>
        <div className="flex gap-2">
          <button className="btn-secondary rounded-lg px-4 py-2 font-semibold" onClick={onBack}>Back To Landing</button>
          <button className="btn-primary rounded-lg px-4 py-2 font-semibold" onClick={downloadPDF}>Download PDF</button>
        </div>
      </div>

      <div className="section-shell p-4 md:p-5 mb-5">
        <div className="grid grid-cols-5 gap-2">
          {stepNames.map((s, i) => (
            <button
              key={s}
              className={`rounded-lg px-2 py-2 text-sm font-semibold border ${step === i ? 'bg-brand-600 text-white border-brand-600' : 'bg-white text-ink-700 border-line'}`}
              onClick={() => setStep(i)}
            >
              {s}
            </button>
          ))}
        </div>
      </div>

      <div className="grid lg:grid-cols-2 gap-6">
        <div className="section-shell p-5 md:p-6">
          {step === 0 && (
            <div>
              <h2 className="text-xl font-bold mb-4">Personal Details</h2>
              <FormInput label="Full Name" value={cvData.personal.name} onChange={(v) => updatePersonal('name', v)} placeholder="Your full name" />
              <FormInput label="Email" value={cvData.personal.email} onChange={(v) => updatePersonal('email', v)} placeholder="name@email.com" type="email" />
              <FormInput label="Phone" value={cvData.personal.phone} onChange={(v) => updatePersonal('phone', v)} placeholder="+27 00 000 0000" />
              <FormInput label="Location" value={cvData.personal.location} onChange={(v) => updatePersonal('location', v)} placeholder="Johannesburg, Gauteng" />
              <FormInput label="LinkedIn" value={cvData.personal.linkedin} onChange={(v) => updatePersonal('linkedin', v)} placeholder="linkedin.com/in/username" />

              <div className="mb-4">
                <label className="block text-sm font-semibold text-ink-700 mb-1.5">Target Role</label>
                <select className="input-field" value={cvData.personal.targetRole} onChange={(e) => updatePersonal('targetRole', e.target.value)}>
                  {supportedRoles.map((role) => <option key={role} value={role}>{role}</option>)}
                </select>
              </div>

              <div>
                <div className="flex justify-between items-center mb-1.5">
                  <label className="block text-sm font-semibold text-ink-700">Professional Summary</label>
                  <button
                    type="button"
                    className="text-sm text-brand-700 font-semibold"
                    onClick={() => updatePersonal('summary', generateFinanceSummary(cvData.personal.targetRole))}
                  >
                    Generate Finance Summary
                  </button>
                </div>
                <textarea
                  rows="4"
                  className="input-field"
                  value={cvData.personal.summary}
                  onChange={(e) => updatePersonal('summary', e.target.value)}
                  placeholder="Add a concise summary aligned to your finance target role."
                />
              </div>
            </div>
          )}

          {step === 1 && (
            <div>
              <div className="flex justify-between items-center mb-4">
                <h2 className="text-xl font-bold">Experience</h2>
                <button className="btn-secondary rounded-lg px-3 py-2 text-sm font-semibold" onClick={addExperience}>Add Role</button>
              </div>

              {cvData.experience.length === 0 ? (
                <p className="text-sm text-ink-600 border border-line rounded-lg p-3 bg-panel">No experience entries yet. Add your first role to begin.</p>
              ) : cvData.experience.map((exp, idx) => (
                <div key={idx} className="border border-line rounded-xl p-4 mb-4 bg-panel">
                  <div className="flex justify-between items-start gap-2 mb-3">
                    <h3 className="font-semibold text-ink-900">Role {idx + 1}</h3>
                    <button className="text-sm text-red-700" onClick={() => removeExperience(idx)}>Remove</button>
                  </div>
                  <FormInput label="Company" value={exp.company} onChange={(v) => updateExperience(idx, { ...exp, company: v })} placeholder="Company name" />
                  <FormInput label="Role Title" value={exp.role} onChange={(v) => updateExperience(idx, { ...exp, role: v })} placeholder="e.g., Accounts Payable Clerk" />
                  <div className="grid grid-cols-2 gap-3">
                    <FormInput label="Start Date" value={exp.startDate} onChange={(v) => updateExperience(idx, { ...exp, startDate: v })} placeholder="Jan 2024" />
                    <FormInput label="End Date" value={exp.endDate} onChange={(v) => updateExperience(idx, { ...exp, endDate: v })} placeholder="Present" />
                  </div>

                  <div className="mb-2 flex justify-between items-center">
                    <label className="block text-sm font-semibold text-ink-700">Achievement Bullets</label>
                    <button className="text-sm text-brand-700 font-semibold" onClick={() => addFinanceSuggestions(idx)}>Insert Suggested Bullets</button>
                  </div>
                  {exp.bullets.map((bullet, bi) => (
                    <div key={bi} className="flex gap-2 mb-2">
                      <textarea
                        className="input-field"
                        rows="2"
                        value={bullet}
                        onChange={(e) => {
                          const updated = [...exp.bullets];
                          updated[bi] = e.target.value;
                          updateExperience(idx, { ...exp, bullets: updated });
                        }}
                        placeholder="Describe responsibilities and outcomes clearly."
                      />
                      <button
                        className="text-red-700 text-sm"
                        onClick={() => {
                          const updated = exp.bullets.filter((_, i) => i !== bi);
                          updateExperience(idx, { ...exp, bullets: updated.length ? updated : [''] });
                        }}
                      >Remove</button>
                    </div>
                  ))}
                  <button
                    className="text-sm text-brand-700 font-semibold"
                    onClick={() => updateExperience(idx, { ...exp, bullets: [...exp.bullets, ''] })}
                  >
                    Add Bullet
                  </button>
                </div>
              ))}
            </div>
          )}

          {step === 2 && (
            <div>
              <h2 className="text-xl font-bold mb-4">Skills And Keywords</h2>
              <SkillCategory
                title="Accounting Skills"
                skills={cvData.skills.accounting}
                onAddSkill={(skill) => addSkill('accounting', skill)}
                onRemoveSkill={(skill) => removeSkill('accounting', skill)}
              />
              <SkillCategory
                title="Tools And Systems"
                skills={cvData.skills.systems}
                onAddSkill={(skill) => addSkill('systems', skill)}
                onRemoveSkill={(skill) => removeSkill('systems', skill)}
              />
              <SkillCategory
                title="Compliance And Controls"
                skills={cvData.skills.compliance}
                onAddSkill={(skill) => addSkill('compliance', skill)}
                onRemoveSkill={(skill) => removeSkill('compliance', skill)}
              />

              <div className="border border-line rounded-lg p-3 bg-panel mt-4">
                <p className="text-sm font-semibold text-ink-900 mb-2">Suggested Keywords</p>
                <div className="flex flex-wrap gap-2">
                  {financeKeywords.slice(0, 12).map((kw) => (
                    <button
                      key={kw}
                      type="button"
                      className="text-xs px-2 py-1 rounded-full bg-brand-100"
                      onClick={() => addSkill('accounting', kw)}
                    >
                      {kw}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {step === 3 && (
            <div>
              <div className="flex justify-between items-center mb-4">
                <h2 className="text-xl font-bold">Education</h2>
                <button className="btn-secondary rounded-lg px-3 py-2 text-sm font-semibold" onClick={addEducation}>Add Education</button>
              </div>

              {cvData.education.length === 0 ? (
                <p className="text-sm text-ink-600 border border-line rounded-lg p-3 bg-panel">No education entries added yet.</p>
              ) : cvData.education.map((edu, idx) => (
                <div key={idx} className="border border-line rounded-xl p-4 mb-4 bg-panel">
                  <div className="flex justify-between items-start gap-2 mb-3">
                    <h3 className="font-semibold text-ink-900">Education {idx + 1}</h3>
                    <button className="text-sm text-red-700" onClick={() => removeEducation(idx)}>Remove</button>
                  </div>
                  <FormInput label="Qualification" value={edu.qualification} onChange={(v) => updateEducation(idx, { ...edu, qualification: v })} placeholder="e.g., Diploma in Financial Accounting" />
                  <FormInput label="Institution" value={edu.institution} onChange={(v) => updateEducation(idx, { ...edu, institution: v })} placeholder="Institution name" />
                  <FormInput label="Year" value={edu.year} onChange={(v) => updateEducation(idx, { ...edu, year: v })} placeholder="2025" />
                </div>
              ))}
            </div>
          )}

          {step === 4 && (
            <div>
              <h2 className="text-xl font-bold mb-4">Review And Optimize</h2>
              <div className="border border-line rounded-lg p-4 bg-panel mb-4">
                <p className="text-sm font-semibold text-ink-900 mb-1">ATS Keyword Coverage</p>
                <p className="text-3xl font-bold text-brand-700">{keywordStatus.score}%</p>
                <p className="text-sm text-ink-700 mt-2">Matched keywords: {keywordStatus.matched.length > 0 ? keywordStatus.matched.join(', ') : 'No target keywords yet'}</p>
              </div>

              <div className="border border-line rounded-lg p-4 bg-white mb-4">
                <h3 className="font-semibold text-ink-900 mb-2">South African CV Guidance</h3>
                <ul className="text-sm text-ink-700 space-y-1">
                  <li>• Keep wording formal, concise, and role-relevant.</li>
                  <li>• Prioritize reconciliations, reporting support, AP/AR, and month-end tasks.</li>
                  <li>• Use measurable outcomes when supported by real experience.</li>
                </ul>
              </div>

              <button className="btn-primary rounded-lg px-4 py-2 font-semibold" onClick={downloadPDF}>Download CV PDF</button>
            </div>
          )}

          <div className="flex justify-between mt-6">
            <button
              className="btn-secondary rounded-lg px-4 py-2 font-semibold"
              disabled={step === 0}
              onClick={() => setStep((s) => Math.max(0, s - 1))}
            >
              Previous
            </button>
            <button
              className="btn-primary rounded-lg px-4 py-2 font-semibold"
              disabled={step === stepNames.length - 1}
              onClick={() => setStep((s) => Math.min(stepNames.length - 1, s + 1))}
            >
              Next
            </button>
          </div>
        </div>

        <div className="section-shell p-4">
          <div className="flex justify-between items-center mb-3">
            <h3 className="font-semibold text-ink-900">Live CV Preview</h3>
            <span className="text-xs text-ink-500">A4 format</span>
          </div>
          <div className="border border-line rounded-xl overflow-hidden bg-white" style={{ aspectRatio: '210 / 297' }}>
            <div className="h-full overflow-y-auto">
              <CVPreview data={cvData} />
            </div>
          </div>
        </div>
      </div>

      <div style={{ position: 'fixed', left: '-99999px', top: 0, width: '190mm', background: '#fff' }} aria-hidden="true">
        <div id="cv-print-area" style={{ width: '190mm', minHeight: '270mm', background: '#fff' }}>
          <CVPreview data={cvData} isPreview={false} />
        </div>
      </div>
    </div>
  );
};

function App() {
  const [view, setView] = useState('landing');
  const [cvData, setCvData] = useState(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultCvData;
      const parsed = JSON.parse(raw);
      return {
        ...defaultCvData,
        ...parsed,
        personal: { ...defaultCvData.personal, ...(parsed.personal || {}) },
        skills: { ...defaultCvData.skills, ...(parsed.skills || {}) },
        experience: Array.isArray(parsed.experience) ? parsed.experience : [],
        education: Array.isArray(parsed.education) ? parsed.education : []
      };
    } catch {
      return defaultCvData;
    }
  });

  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cvData));
    } catch {}
  }, [cvData]);

  const hasSavedProgress = Boolean(
    cvData.personal.name.trim() ||
    cvData.personal.email.trim() ||
    cvData.personal.phone.trim() ||
    cvData.personal.location.trim() ||
    cvData.personal.linkedin.trim() ||
    cvData.personal.summary.trim() ||
    cvData.experience.length > 0 ||
    cvData.education.length > 0 ||
    cvData.skills.accounting.length > 0 ||
    cvData.skills.systems.length > 0 ||
    cvData.skills.compliance.length > 0
  );

  const handleStartNew = () => {
    try {
      localStorage.removeItem(STORAGE_KEY);
    } catch {}
    setCvData(defaultCvData);
    setView('builder');
  };

  return view === 'landing'
    ? <LandingPage onStart={() => setView('builder')} hasSavedProgress={hasSavedProgress} onStartNew={handleStartNew} />
    : <Builder cvData={cvData} setCvData={setCvData} onBack={() => setView('landing')} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
